<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero02's BookMark</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="extra-data"></div>

    <!-- 切换按钮容器 -->
    <div class="toggle-buttons-container">
        <button id="toggle-extra-btn" class="toggle-btn" title="查看更多">
            <i class="fas fa-chevron-right"></i>
        </button>
        <button id="close-extra-btn" class="toggle-btn close-btn" title="返回" style="display: none;">
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <!-- 额外内容展示页面 -->
    <div id="extra-page" class="extra-page">
        <div class="extra-content" id="extra-content">
            <!-- av like 和 tag 内容由 render.js 动态生成 -->
        </div>
    </div>

    <header>
        <div class="container">
            <h1 class="title-container">
                <img src="avatar.jpg" alt="Avatar" class="title-avatar">
                <span class="title-text">Zero02's BookMark</span>
            </h1>
            <div class="search-box">
                <input type="text" id="search" placeholder="搜索书签...">
                <button id="search-btn"><i class="fas fa-search"></i></button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="category-filter">
            <!-- 分类按钮由 build.js 生成 -->
        </div>

        <div class="bookmarks-container" id="bookmarks-container">
            <!-- 书签内容由 build.js 生成 -->
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2025 书签导航 | 静态生成 + 实时交互</p>
        </div>
    </footer>

    <!-- 交互逻辑 -->
    <script src="render.js"></script>
</body>
</html>
